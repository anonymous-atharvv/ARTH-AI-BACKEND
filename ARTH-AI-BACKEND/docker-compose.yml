version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: arthai-db
    environment:
      POSTGRES_USER: arthai_user
      POSTGRES_PASSWORD: arthai_password
      POSTGRES_DB: arthai_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arthai_user -d arthai_prod"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: arthai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arthai-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://arthai_user:arthai_password@db:5432/arthai_prod
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=production-secret-key-to-be-overridden
      - ENVIRONMENT=production
      - DEMO_MODE=true
    ports:
      - "8000:7860"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arthai-celery-worker
    command: celery -A tasks.celery_app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://arthai_user:arthai_password@db:5432/arthai_prod
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - ENVIRONMENT=production
      - DEMO_MODE=true
    depends_on:
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arthai-celery-beat
    command: celery -A tasks.celery_app.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://arthai_user:arthai_password@db:5432/arthai_prod
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - ENVIRONMENT=production
      - DEMO_MODE=true
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
